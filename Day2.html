<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
<style>
    body {
        font-family: Arial, sans-serif;
        
    }

    table {
        border-collapse: collapse;
        margin: auto;
        background: #fff;
        
    }

    th, td {
        border: 1px groove #1d7b8c;
        text-align: center;
        padding: 10px;
    
    }
colgroup{
    text-align: right;
}
    th {
        
        font-weight: bold;
    }
td:nth-child(5),
td:nth-child(6),
td:nth-child(7){
    text-align: right;
}

    .left {
        text-align: left;
    }
    .right {
        text-align: right;
    }
</style>
</head>
<body>
