<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(178, 182, 219);
        }
        .container{
            display: flex;
            justify-content: space-between;
            margin: auto;
            width:70%;
            border-radius: 10px;
            /* background-color: aquamarine; */
           padding: 20px;
            /* min-width:400px; */
            /* background: #fef2f2; */
             
        }
        .control{
            display: flex;
            flex-direction: column;
            gap:3px;
            /* width: 200px; */
            
        }
        .nextcontainer{
            text-align: center;
            /* background-color: rgb(255, 127, 150); */
            /* margin-top: 10px; */
            /* margin: auto; */
            padding-bottom: 20px;
        }
        .main{
            background-color: rgb(138, 127, 255);
            width: 50%;
            margin: auto;
            border-radius: 10px;
            /* background-color: aquamarine; */
           
        }
        .card{
            padding-left: 10px;
            width:150px;
           border-radius: 10px;
           border:solid 2px green;
            background-color: rgb(125, 177, 70);
        }
    </style>
</head>
<body>
<div class="main">
    <div class="container">
        <!-- left side -->
        <section class="control"> 
            <h2>Update Variables</h2> 
            <label for="name" >Name (String):</label>        
            <input type="text" id="name" value="mg mg"></input>
            <label for="age" >Age(Number):</label>
            <input type="number" id="age" value="32"></input>
            <label for="men" >VIP Staus:</label>
            <input type="checkbox" id="men" value="44"></input>
            <h2>Card Color</h2>
            <label for="card" ></label>
            <input type="color" id="card" ></input>
        </section>           
            <!-- right side   -->
        <section >
            <h2>Live DOM</h2>
            <div class="card">
                <h3  id="nameOutput">Sample Name</h3>
                <p>Name:<span>mg mg</span></p>
                <p>Age:<span>40</span></p>
            </div>
        </section>
   </div>
    <div class="nextcontainer">
        <h2>Next Container</h2>
    </div>
</div>
</body>
</html>
