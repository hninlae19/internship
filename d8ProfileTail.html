<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ship faster with</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div

      <button

      </div>
      <div class="text-md text-white text-center">
        Build,deploy,and scale your applications with ease.
      </div>
      <div class="flex gap-4">

          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 border border-blue-700 rounded-lg"

          Get Started
        </button>

        <div class="bg-blue-700 rounded-md p-3">
          <div class="bg-purple-700 rounded-lg w-10 p-2">🎁</div>
          <div class="font-bold text-white">892</div>
          <div class="text-gray-400">New Users</div>
