<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tail Daskboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <section class="bg-red-500 p-4 grid grid-cols-4 gap-4">
      <div class="bg-white rounded-lg p-4">
        <p>🎰</p>
        <h1 class="font-bold text-white">2.4k</h1>
        <p class="text-xs text-gray-500">Page Views</p>
      </div>
      <div class="bg-white rounded-lg p-4">
        <p>💰</p>
        <h1 class="font-bold text-white">$8.2k</h1>
        <p class="text-xs text-gray-500">Revenue</p>
      </div>
      <div class="bg-white rounded-lg p-4">
        <p>🎁</p>
        <h1 class="font-bold text-white">892</h1>
        <p class="text-xs text-gray-500">New Users</p>
      </div>
      <div class="bg-white rounded-lg p-4">
        <p>⭐</p>
        <h1 class="font-bold text-white">4.9</h1>
        <p class="text-xs text-gray-500">Rating</p>
      </div>
    </section>
  </body>
</html>
